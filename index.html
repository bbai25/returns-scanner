<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Return Package Scanner</title>
<script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>

<style>
body{font-family:Arial;padding:15px;background:#f4f4f4}
.card{background:white;padding:15px;border-radius:12px;margin-bottom:15px}
input,select,textarea,button{width:100%;padding:12px;margin:8px 0;font-size:16px;box-sizing:border-box}
button{background:#000;color:white;border:0;border-radius:10px}
button:disabled{background:#888}
#reader{width:100%;margin-top:10px}
.status{background:#eef;padding:10px;border-radius:8px;white-space:pre-wrap}
.required{color:red}
</style>
</head>

<body>

<div class="card">
<h2>Return Package Scanner</h2>

<label>Driver Name <span class="required">*</span></label>
<input id="driverName" placeholder="Enter driver name">

<label>Scanned TBA / Barcode <span class="required">*</span></label>
<input id="tbaCode" placeholder="Scan or type TBA">

<button id="scanBtn">Start Camera Scan</button>

<div id="reader"></div>
<div id="status" class="status">Ready.</div>
</div>

<div class="card">
<label>Return Reason <span class="required">*</span></label>
<select id="reason">
<option value="">Select Reason</option>
<option>Business Closed</option>
<option>Customer Unavailable</option>
<option>Access Problem</option>
<option>Unable to Locate Address</option>
<option>Damaged Package</option>
<option>Package Not on Route</option>
<option>Station Issue</option>
<option>Other</option>
</select>

<label>Notes <span class="required">*</span></label>
<textarea id="notes" placeholder="Required: explain the return"></textarea>

<label>Photo Proof <span class="required">*</span></label>
<input id="photo" type="file" accept="image/*" capture="environment">

<button id="submitBtn">Submit Return</button>
</div>

<iframe name="hiddenFrame" style="display:none;"></iframe>

<form id="hiddenForm" method="POST" target="hiddenFrame"
action="https://script.google.com/macros/s/AKfycbxnDWfkhE63t_ApRmQoRW6KMcvtkmQnCzaWatu9pFV1uXViPVJq0lxECAPAJWnHJf7Z/exec"
style="display:none;">
  <textarea name="payload" id="payload"></textarea>
</form>

<script>
const statusBox = document.getElementById("status");
const submitBtn = document.getElementById("submitBtn");
let scanner = null;
let scannerRunning = false;

function show(msg){
  statusBox.innerText = msg;
}

async function stopScanner(){
  try {
    if (scanner && scannerRunning) {
      await scanner.stop();
      await scanner.clear();
    }
  } catch(e) {}
  scanner = null;
  scannerRunning = false;
}

async function startScanner(){
  try {
    await stopScanner();

    show("Opening camera...");
    document.getElementById("reader").innerHTML = "";

    scanner = new Html5Qrcode("reader");
    scannerRunning = true;

    await scanner.start(
      { facingMode: "environment" },
      { fps: 10, qrbox: 250 },
      async function(decodedText){
        document.getElementById("tbaCode").value = decodedText;
        show("Scanned: " + decodedText);
        await stopScanner();
      }
    );

  } catch(err) {
    scannerRunning = false;
    show("Camera error: " + err);
  }
}

document.getElementById("scanBtn").addEventListener("click", startScanner);

function compressImage(file) {
  return new Promise((resolve, reject) => {
    const img = new Image();
    const reader = new FileReader();

    reader.onload = e => img.src = e.target.result;

    img.onload = () => {
      const canvas = document.createElement("canvas");
      const maxWidth = 600;
      const scale = Math.min(1, maxWidth / img.width);

      canvas.width = img.width * scale;
      canvas.height = img.height * scale;

      const ctx = canvas.getContext("2d");
      ctx.drawImage(img, 0, 0, canvas.width, canvas.height);

      resolve(canvas.toDataURL("image/jpeg", 0.4));
    };

    reader.onerror = reject;
    img.onerror = reject;
    reader.readAsDataURL(file);
  });
}

function validateForm(){
  const driver = document.getElementById("driverName").value.trim();
  const tba = document.getElementById("tbaCode").value.trim();
  const reason = document.getElementById("reason").value;
  const notes = document.getElementById("notes").value.trim();
  const photoFile = document.getElementById("photo").files[0];

  if (!driver) {
    show("Driver name is required.");
    return false;
  }

  if (!tba) {
    show("TBA/barcode is required. Scan or type it.");
    return false;
  }

  if (!reason) {
    show("Return reason is required.");
    return false;
  }

  if (!notes) {
    show("Notes are required.");
    return false;
  }

  if (!photoFile) {
    show("Photo proof is required.");
    return false;
  }

  return true;
}

document.getElementById("submitBtn").addEventListener("click", async function(){

  if (!validateForm()) return;

  const driver = document.getElementById("driverName").value.trim();
  const tba = document.getElementById("tbaCode").value.trim();
  const reason = document.getElementById("reason").value;
  const notes = document.getElementById("notes").value.trim();
  const photoFile = document.getElementById("photo").files[0];

  try {
    submitBtn.disabled = true;
    show("Compressing photo...");

    const photoBase64 = await compressImage(photoFile);

    const data = {
      driver,
      tba,
      reason,
      notes,
      photoName: tba + "_return.jpg",
      photoBase64
    };

    document.getElementById("payload").value = JSON.stringify(data);

    show("Submitting...");
    document.getElementById("hiddenForm").submit();

    setTimeout(async () => {

      const another = confirm("Return submitted successfully.\n\nSubmit another package?");

      if (another) {
        document.getElementById("tbaCode").value = "";
        document.getElementById("reason").value = "";
        document.getElementById("notes").value = "";
        document.getElementById("photo").value = "";

        show("Ready for next package. Tap Start Camera Scan.");

        setTimeout(() => {
          startScanner();
        }, 500);

      } else {
        show("All done. You can close the page.");
      }

      submitBtn.disabled = false;

    }, 2500);

  } catch(err) {
    submitBtn.disabled = false;
    show("Error: " + err);
  }
});
</script>

</body>
</html>
