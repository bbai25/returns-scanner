<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Return Scanner</title>

<script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>

<style>
body { font-family: Arial; padding: 15px; background:#f4f4f4;}
.card { background:white; padding:15px; border-radius:12px; margin-bottom:15px;}
button { width:100%; padding:12px; font-size:16px; background:black; color:white; border:none; border-radius:10px;}
input, select, textarea { width:100%; padding:10px; margin-top:5px; border-radius:8px; border:1px solid #ccc;}
#reader { width:100%; margin-top:10px; }
.status { margin-top:10px; padding:10px; background:#eee; border-radius:8px;}
</style>
</head>

<body>

<div class="card">
<h2>Return Package Scanner</h2>

<label>Driver Name</label>
<input id="driverName">

<label>Scanned TBA / Barcode</label>
<input id="tbaCode">

<button onclick="startScanner()">Start Camera Scan</button>
<div id="reader"></div>
<div id="status" class="status">Scanner not started</div>
</div>

<div class="card">
<label>Return Reason</label>
<select id="reason">
<option value="">Select</option>
<option>Business Closed</option>
<option>Customer Unavailable</option>
<option>Access Problem</option>
<option>Damaged Package</option>
<option>Other</option>
</select>

<label>Notes</label>
<textarea id="notes"></textarea>

<label>Photo</label>
<input type="file" accept="image/*" capture="environment">

<button onclick="submitForm()">Submit</button>
</div>

<script>
let scanner;

function startScanner() {
  document.getElementById("status").innerText = "Opening camera...";
  document.getElementById("reader").style.display = "block";

  scanner = new Html5Qrcode("reader");

  scanner.start(
    { facingMode: "environment" },
    { fps: 10, qrbox: 250 },
    function(decodedText) {
      document.getElementById("tbaCode").value = decodedText;
      document.getElementById("status").innerText = "Scanned: " + decodedText;
      scanner.stop();
      document.getElementById("reader").style.display = "none";
    }
  ).catch(err => {
    document.getElementById("status").innerText = "Camera error: " + err;
  });
}

function submitForm() {
  const data = {
    driver: document.getElementById("driverName").value,
    tba: document.getElementById("tbaCode").value,
    reason: document.getElementById("reason").value,
    notes: document.getElementById("notes").value
  };

  alert("Test Submit:\n\n" + JSON.stringify(data, null, 2));
}
</script>

</body>
</html>
