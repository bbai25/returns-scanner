<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Return Package Scanner</title>

<script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>

<style>
body{font-family:Arial;padding:15px;background:#f4f4f4}
.card{background:white;padding:15px;border-radius:12px;margin-bottom:15px}
input,select,textarea,button{width:100%;padding:12px;margin:8px 0;font-size:16px;box-sizing:border-box}
button{background:#000;color:white;border:0;border-radius:10px}
#reader{width:100%;margin-top:10px}
.status{background:#eef;padding:10px;border-radius:8px;white-space:pre-wrap}
</style>
</head>

<body>

<div class="card">
<h2>Return Package Scanner</h2>

<label>Driver Name</label>
<input id="driverName" placeholder="Enter driver name">

<label>Scanned TBA / Barcode</label>
<input id="tbaCode" placeholder="Scan or type TBA">

<button id="scanBtn">Start Camera Scan</button>

<div id="reader"></div>
<div id="status" class="status">Page loaded. Ready.</div>
</div>

<div class="card">
<label>Return Reason</label>
<select id="reason">
<option value="">Select Reason</option>
<option>Business Closed</option>
<option>Customer Unavailable</option>
<option>Access Problem</option>
<option>Unable to Locate Address</option>
<option>Damaged Package</option>
<option>Package Not on Route</option>
<option>Station Issue</option>
<option>Other</option>
</select>

<label>Notes</label>
<textarea id="notes" placeholder="Add notes if needed"></textarea>

<label>Photo Proof</label>
<input id="photo" type="file" accept="image/*" capture="environment">

<button id="submitBtn">Submit Return</button>
</div>

<script>
const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbxnDWfkhE63t_ApRmQoRW6KMcvtkmQnCzaWatu9pFV1uXViPVJq0lxECAPAJWnHJf7Z/exec";

const statusBox = document.getElementById("status");
let scanner;

function show(msg){
  statusBox.innerText = msg;
}

window.onerror = function(message, source, lineno, colno, error){
  show("JavaScript error:\n" + message + "\nLine: " + lineno);
};

document.getElementById("scanBtn").addEventListener("click", async function(){
  show("Button clicked. Checking scanner library...");

  if (typeof Html5Qrcode === "undefined") {
    show("ERROR: Scanner library did not load.");
    return;
  }

  try {
    show("Opening camera. Allow camera permission.");

    scanner = new Html5Qrcode("reader");

    await scanner.start(
      { facingMode: "environment" },
      { fps: 10, qrbox: 250 },
      function(decodedText){
        document.getElementById("tbaCode").value = decodedText;
        show("Scanned: " + decodedText);
        scanner.stop();
      }
    );

  } catch(err) {
    show("Camera error:\n" + err);
  }
});

function fileToBase64(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = () => resolve(reader.result);
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

document.getElementById("submitBtn").addEventListener("click", async function(){

  const photoFile = document.getElementById("photo").files[0];

  const data = {
    driver: document.getElementById("driverName").value.trim(),
    tba: document.getElementById("tbaCode").value.trim(),
    reason: document.getElementById("reason").value,
    notes: document.getElementById("notes").value.trim(),
    photoName: photoFile ? photoFile.name : "",
    photoBase64: photoFile ? await fileToBase64(photoFile) : ""
  };

  if (!data.driver || !data.tba || !data.reason) {
    show("Missing info. Driver name, TBA, and reason are required.");
    return;
  }

  if (!photoFile) {
    show("Photo is required.");
    return;
  }

  try {
    show("Saving return and uploading photo...");

    await fetch(WEB_APP_URL, {
      method: "POST",
      mode: "no-cors",
      body: JSON.stringify(data)
    });

    show("Saved to Google Sheet with photo.");

    document.getElementById("tbaCode").value = "";
    document.getElementById("reason").value = "";
    document.getElementById("notes").value = "";
    document.getElementById("photo").value = "";

  } catch (err) {
    show("Error sending data:\n" + err);
  }
});
</script>

</body>
</html>
