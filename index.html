<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Return Package Scanner</title>
<script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
<style>
body{font-family:Arial;padding:15px;background:#f4f4f4}
.card{background:white;padding:15px;border-radius:12px;margin-bottom:15px}
input,select,textarea,button{width:100%;padding:12px;margin:8px 0;font-size:16px;box-sizing:border-box}
button{background:#000;color:white;border:0;border-radius:10px}
#reader{width:100%;margin-top:10px}
.status{background:#eef;padding:10px;border-radius:8px;white-space:pre-wrap}
</style>
</head>
<body>

<div class="card">
<h2>Return Package Scanner</h2>
<label>Driver Name</label>
<input id="driverName" placeholder="Enter driver name">

<label>Scanned TBA / Barcode</label>
<input id="tbaCode" placeholder="Scan or type TBA">

<button id="scanBtn">Start Camera Scan</button>
<div id="reader"></div>
<div id="status" class="status">Ready.</div>
</div>

<div class="card">
<label>Return Reason</label>
<select id="reason">
<option value="">Select Reason</option>
<option>Business Closed</option>
<option>Customer Unavailable</option>
<option>Access Problem</option>
<option>Unable to Locate Address</option>
<option>Damaged Package</option>
<option>Package Not on Route</option>
<option>Station Issue</option>
<option>Other</option>
</select>

<label>Notes</label>
<textarea id="notes"></textarea>

<label>Photo Proof</label>
<input id="photo" type="file" accept="image/*" capture="environment">

<button id="submitBtn">Submit Return</button>
</div>

<script>
const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbxnDWfkhE63t_ApRmQoRW6KMcvtkmQnCzaWatu9pFV1uXViPVJq0lxECAPAJWnHJf7Z/exec";

const statusBox = document.getElementById("status");
let scanner;

function show(msg){ statusBox.innerText = msg; }

document.getElementById("scanBtn").addEventListener("click", async function(){
  try {
    show("Opening camera...");
    scanner = new Html5Qrcode("reader");
    await scanner.start(
      { facingMode: "environment" },
      { fps: 10, qrbox: 250 },
      function(decodedText){
        document.getElementById("tbaCode").value = decodedText;
        show("Scanned: " + decodedText);
        scanner.stop();
      }
    );
  } catch(err) {
    show("Camera error: " + err);
  }
});

function compressImage(file) {
  return new Promise((resolve, reject) => {
    const img = new Image();
    const reader = new FileReader();

    reader.onload = e => {
      img.src = e.target.result;
    };

    img.onload = () => {
      const canvas = document.createElement("canvas");
      const maxWidth = 900;
      const scale = Math.min(1, maxWidth / img.width);

      canvas.width = img.width * scale;
      canvas.height = img.height * scale;

      const ctx = canvas.getContext("2d");
      ctx.drawImage(img, 0, 0, canvas.width, canvas.height);

      const compressedBase64 = canvas.toDataURL("image/jpeg", 0.55);
      resolve(compressedBase64);
    };

    reader.onerror = reject;
    img.onerror = reject;
    reader.readAsDataURL(file);
  });
}

document.getElementById("submitBtn").addEventListener("click", async function(){
  const photoFile = document.getElementById("photo").files[0];

  if (!document.getElementById("driverName").value.trim()) {
    show("Driver name required");
    return;
  }

  if (!document.getElementById("tbaCode").value.trim()) {
    show("TBA required");
    return;
  }

  if (!document.getElementById("reason").value) {
    show("Return reason required");
    return;
  }

  if (!photoFile) {
    show("Photo required");
    return;
  }

  try {
    show("Compressing photo...");

    const compressedPhoto = await compressImage(photoFile);

    const data = {
      driver: document.getElementById("driverName").value.trim(),
      tba: document.getElementById("tbaCode").value.trim(),
      reason: document.getElementById("reason").value,
      notes: document.getElementById("notes").value.trim(),
      photoName: "return_photo.jpg",
      photoBase64: compressedPhoto
    };

    show("Uploading to Google Sheet...");

    await fetch(WEB_APP_URL, {
      method: "POST",
      mode: "no-cors",
      body: JSON.stringify(data)
    });

    show("Saved to Google Sheet with photo.");

    document.getElementById("tbaCode").value = "";
    document.getElementById("reason").value = "";
    document.getElementById("notes").value = "";
    document.getElementById("photo").value = "";

  } catch(err) {
    show("Error sending data: " + err);
  }
});
</script>

</body>
</html>
